services:
  - type: web
    name: erwin-chat
    runtime: node
    repo: https://github.com/AskJoe/LibreChat.git
    branch: main
    region: oregon
    plan: starter
    buildCommand: npm install --include=dev && npm run frontend
    startCommand: npm run backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: MONGO_URI
        sync: false
      - key: APP_TITLE
        value: Erwin
      - key: ALLOW_EMAIL_LOGIN
        value: "true"
      - key: ALLOW_REGISTRATION
        value: "true"
      - key: ALLOW_UNVERIFIED_EMAIL_LOGIN
        value: "true"
      - key: ALLOW_SOCIAL_LOGIN
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CREDS_KEY
        generateValue: true
      - key: CREDS_IV
        value: e2341419ec3dd3d19b13a1a87fafcbfb
      - key: SESSION_EXPIRY
        value: "900000"
      - key: REFRESH_TOKEN_EXPIRY
        value: "604800000"
      - key: SUPABASE_URL
        value: https://ottyikzfkkzxddcywjpx.supabase.co
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODELS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODELS
        sync: false
      - key: GOOGLE_KEY
        sync: false
      - key: GOOGLE_MODELS
        sync: false
      - key: HELP_AND_FAQ_URL
        value: https://marketpower.ai
      - key: SEARCH
        value: "false"
      - key: NO_INDEX
        value: "true"
      - key: IMAGE_GEN_OAI_API_KEY
        sync: false
      - key: IMAGE_GEN_OAI_MODEL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Supabase Storage (S3-compatible) for persistent file uploads
      - key: AWS_ENDPOINT_URL
        value: https://mdnkbikjiuuudsrfzgkb.supabase.co/storage/v1/s3
      - key: AWS_BUCKET_NAME
        value: erwin-files
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_FORCE_PATH_STYLE
        value: "true"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

