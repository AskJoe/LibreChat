services:
  - type: web
    name: erwin-chat
    runtime: node
    repo: https://github.com/AskJoe/LibreChat.git
    branch: main
    region: oregon
    plan: starter
    buildCommand: npm install --include=dev && npm run frontend
    startCommand: npm run backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: MONGO_URI
        sync: false
      - key: APP_TITLE
        value: Erwin
      - key: ALLOW_EMAIL_LOGIN
        value: "true"
      - key: ALLOW_REGISTRATION
        value: "true"
      - key: ALLOW_UNVERIFIED_EMAIL_LOGIN
        value: "true"
      - key: ALLOW_SOCIAL_LOGIN
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CREDS_KEY
        generateValue: true
      - key: CREDS_IV
        value: e2341419ec3dd3d19b13a1a87fafcbfb
      - key: SESSION_EXPIRY
        value: "900000"
      - key: REFRESH_TOKEN_EXPIRY
        value: "604800000"
      - key: SUPABASE_URL
        value: https://ottyikzfkkzxddcywjpx.supabase.co
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        value: user_provided
      - key: OPENAI_MODELS
        value: gpt-5.4,gpt-5.4-mini,gpt-5.4-nano,gpt-5-mini,gpt-5-nano,gpt-4o,gpt-4o-mini,gpt-4-turbo
      - key: ANTHROPIC_API_KEY
        value: user_provided
      - key: ANTHROPIC_MODELS
        value: claude-opus-4-7,claude-sonnet-4-6,claude-sonnet-4-20250514,claude-3-7-sonnet-20250219,claude-3-5-sonnet-20241022,claude-3-5-haiku-20241022
      - key: GOOGLE_KEY
        value: user_provided
      - key: GOOGLE_MODELS
        value: gemini-3.1-pro-preview,gemini-2.5-pro,gemini-2.5-flash,gemini-2.5-flash-lite,gemini-2.0-flash,gemini-2.0-flash-lite
      - key: HELP_AND_FAQ_URL
        value: https://marketpower.ai
      - key: SEARCH
        value: "false"
      - key: NO_INDEX
        value: "true"
      - key: IMAGE_GEN_OAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

