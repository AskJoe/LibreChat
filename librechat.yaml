# Erwin / CloudWise Academy — LibreChat Configuration
# https://www.librechat.ai/docs/configuration/librechat_yaml

version: 1.3.8

cache: true

# Use Supabase Storage (S3-compatible) for persistent file storage
fileStrategy: "s3"

# Interface settings (non-permission fields only)
# Permission fields (agents, prompts, webSearch, etc.) are managed via
# Admin Panel → Roles, NOT here — because this YAML overwrites BOTH
# USER and ADMIN roles on every restart.
interface:
  customWelcome: 'Welcome to Erwin — your AI assistant, powered by CloudWise Academy.'
  modelSelect: true
  parameters: true
  presets: true

registration:
  socialLogins: []
